version: "3.9"

services:
  backend:
    build: ./backend
    container_name: kubesentinel-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./mock-data:/mock-data
    depends_on: []
    restart: unless-stopped
    networks:
      - kubesentinel

  frontend:
    build: ./frontend
    container_name: kubesentinel-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kubesentinel

  watcher-agent:
    build: ./watcher-agent
    container_name: kubesentinel-watcher
    env_file:
      - .env
    environment:
      - WATCHER_MOCK_MODE=true
      - WATCHER_BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kubesentinel

networks:
  kubesentinel:
    driver: bridge
