# ─── auth-service ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kubesentinel-demo
  labels:
    app: auth-service
    kubesentinel-node-id: auth-svc
    kubesentinel-type: service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        kubesentinel-node-id: auth-svc
    spec:
      serviceAccountName: auth-sa
      containers:
      - name: auth-service
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests: { cpu: "50m", memory: "64Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
        readinessProbe:
          httpGet: { path: /, port: 80 }
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kubesentinel-demo
  labels:
    kubesentinel-node-id: auth-svc
spec:
  selector:
    app: auth-service
  ports:
  - port: 80
    targetPort: 80
---
